# =============================================================================
#  SARA Configuration File
#  Location: config/sara.conf
#  Edit this file to customize SARA's behaviour.
# =============================================================================

# ── Core Paths ────────────────────────────────────────────────────────────────
# SARA_ROOT is set dynamically by the entrypoint script.
# You may override it here if needed:
# SARA_ROOT="/opt/sara"

SARA_LOG_DIR="$SARA_ROOT/logs"
SARA_ACTIONS_LOW="$SARA_ROOT/actions/low_level"
SARA_ACTIONS_HIGH="$SARA_ROOT/actions/high_level"

# ── Display / Screen ──────────────────────────────────────────────────────────
# X display to use for GUI automation (default :0)
SARA_DISPLAY=":0"

# Default browser command (used when app not found locally)
SARA_BROWSER="xdg-open"

# ── Timing ────────────────────────────────────────────────────────────────────
# Delay (seconds) after opening a new window before automation begins
SARA_WINDOW_OPEN_DELAY=2

# Delay (seconds) between low-level actions
SARA_ACTION_DELAY=0.3

# ── Notifications ─────────────────────────────────────────────────────────────
# Set to "true" to enable desktop notifications via notify-send
SARA_NOTIFY_ENABLED="true"

# Notification timeout in milliseconds
SARA_NOTIFY_TIMEOUT=4000

# ── Logging ───────────────────────────────────────────────────────────────────
# Log levels: DEBUG | INFO | WARN | ERROR
SARA_LOG_LEVEL="INFO"

# Maximum log file size before rotation (in KB)
SARA_LOG_MAX_SIZE=1024

# ── Security Validator ────────────────────────────────────────────────────────
# Comma-separated list of dangerous command patterns the validator will block
SARA_BLOCKED_PATTERNS="rm -rf /,mkfs,dd if=,:(){ :|:&};:,chmod 777 /,chown -R root /,/dev/sda,shred,wipefs,fdisk /dev/sd,/etc/passwd,/etc/shadow,shutdown -h,reboot,halt,poweroff,kill -9 1,pkill -9,iptables -F"

# ── Spotify ───────────────────────────────────────────────────────────────────
# Spotify web URL to fall back to if local app not found
SARA_SPOTIFY_WEB_URL="https://open.spotify.com"

# Spotify desktop binary name (as it appears in PATH)
SARA_SPOTIFY_BIN="spotify"

# ── YouTube ───────────────────────────────────────────────────────────────────
SARA_YOUTUBE_URL="https://www.youtube.com"
SARA_YOUTUBE_SEARCH_URL="https://www.youtube.com/results?search_query="

# ── Google ────────────────────────────────────────────────────────────────────
SARA_GOOGLE_SEARCH_URL="https://www.google.com/search?q="

# ── Trash ─────────────────────────────────────────────────────────────────────
# Standard XDG trash directory
SARA_TRASH_DIR="$HOME/.local/share/Trash"
