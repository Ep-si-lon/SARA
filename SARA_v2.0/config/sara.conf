# =============================================================================
#  SARA Configuration File  |  Version 2.0
#  Location: config/sara.conf
#  Edit this file to customize SARA's behaviour.
# =============================================================================

# ── Agent Identity ────────────────────────────────────────────────────────────
# The wake word and agent name used everywhere in SARA.
# Change with:  sara rename "JARVIS"
# Or edit this line directly and restart SARA.
#
# Examples:  SARA  |  JARVIS  |  NOVA  |  ALEX  |  ARIA  |  MAX
#
AGENT_NAME="SARA"

# ── Core Paths ────────────────────────────────────────────────────────────────
SARA_LOG_DIR="$SARA_ROOT/logs"
SARA_ACTIONS_LOW="$SARA_ROOT/actions/low_level"
SARA_ACTIONS_HIGH="$SARA_ROOT/actions/high_level"

# ── Display / Screen ──────────────────────────────────────────────────────────
SARA_DISPLAY=":0"
SARA_BROWSER="xdg-open"

# ── Timing ────────────────────────────────────────────────────────────────────
SARA_WINDOW_OPEN_DELAY=2
SARA_ACTION_DELAY=0.3

# ── Notifications ─────────────────────────────────────────────────────────────
SARA_NOTIFY_ENABLED="true"
SARA_NOTIFY_TIMEOUT=4000

# ── Logging ───────────────────────────────────────────────────────────────────
SARA_LOG_LEVEL="INFO"
SARA_LOG_MAX_SIZE=1024

# ── Security Validator ────────────────────────────────────────────────────────
SARA_BLOCKED_PATTERNS="rm -rf /,mkfs,dd if=,:(){ :|:&};:,chmod 777 /,chown -R root /,/dev/sda,shred,wipefs,fdisk /dev/sd,/etc/passwd,/etc/shadow,shutdown -h,reboot,halt,poweroff,kill -9 1,pkill -9,iptables -F"

# ── Spotify ───────────────────────────────────────────────────────────────────
SARA_SPOTIFY_WEB_URL="https://open.spotify.com"
SARA_SPOTIFY_BIN="spotify"

# ── YouTube ───────────────────────────────────────────────────────────────────
SARA_YOUTUBE_URL="https://www.youtube.com"
SARA_YOUTUBE_SEARCH_URL="https://www.youtube.com/results?search_query="

# ── Google ────────────────────────────────────────────────────────────────────
SARA_GOOGLE_SEARCH_URL="https://www.google.com/search?q="

# ── Trash ─────────────────────────────────────────────────────────────────────
SARA_TRASH_DIR="$HOME/.local/share/Trash"

# =============================================================================
#  VERSION 2.0  —  VOICE SETTINGS
# =============================================================================

# ── Voice Auto-Start ──────────────────────────────────────────────────────────
# Set "true" to start voice listener automatically when 'sara activate' runs
SARA_VOICE_AUTO_START="true"

# ── Speech Recognition Engine ─────────────────────────────────────────────────
#   vosk    → fully OFFLINE, fast, private, no internet needed  [RECOMMENDED]
#   google  → online, slightly more accurate, needs internet
SARA_VOICE_ENGINE="vosk"

# ── Vosk Model Path ───────────────────────────────────────────────────────────
# Download a model from: https://alphacephei.com/vosk/models
# Recommended: vosk-model-small-en-us-0.15  (40MB, fast)
# Unzip it, rename the folder to "vosk-model", place inside SARA/models/
SARA_VOSK_MODEL_PATH="$SARA_ROOT/models/vosk-model"

# ── Microphone ────────────────────────────────────────────────────────────────
# Energy threshold — higher needs louder sound to trigger
# Quiet room: 200-400  |  Noisy room: 1000-3000
SARA_MIC_ENERGY_THRESHOLD=300

# Automatically adjust mic sensitivity to ambient noise on startup
SARA_MIC_AUTO_ADJUST="true"

# ── Timing ────────────────────────────────────────────────────────────────────
# Seconds to listen for a command after wake word is detected
SARA_VOICE_COMMAND_TIMEOUT=5

# Seconds of silence that ends a phrase
SARA_VOICE_PHRASE_TIMEOUT=1

# ── Audio Feedback ────────────────────────────────────────────────────────────
# Play a beep when wake word is detected (uses paplay / aplay)
SARA_VOICE_BEEP="true"

# Speak back a confirmation using text-to-speech
SARA_VOICE_SPEAK_BACK="false"
SARA_TTS_ENGINE="espeak"    # espeak | festival | none

# ── Wake Word Sensitivity ─────────────────────────────────────────────────────
# 0.0 = very permissive (more false triggers)
# 1.0 = very strict     (may miss soft speech)
SARA_WAKE_WORD_SENSITIVITY=0.6

# ── Voice Listener PID file ───────────────────────────────────────────────────
SARA_VOICE_PID_FILE="$SARA_ROOT/core/voice_listener.pid"
